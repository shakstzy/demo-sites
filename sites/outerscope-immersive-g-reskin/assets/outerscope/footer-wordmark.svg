<svg xmlns="http://www.w3.org/2000/svg" width="1917" height="735" viewBox="0 0 1917 735" role="img" aria-label="Outerscope embossed metal wordmark">
  <defs>
    <filter id="plate-grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.22"/>
      </feComponentTransfer>
    </filter>
    <filter id="letter-deboss" x="-5%" y="-35%" width="110%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="soft"/>
      <feOffset in="soft" dx="5" dy="6" result="darkEdge"/>
      <feOffset in="soft" dx="-4" dy="-4" result="lightEdge"/>
      <feComposite in="darkEdge" in2="SourceAlpha" operator="out" result="outerDark"/>
      <feComposite in="lightEdge" in2="SourceAlpha" operator="out" result="outerLight"/>
      <feColorMatrix in="outerDark" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.024 0 0 0 0 0.03 0 0 0 0.55 0" result="dark"/>
      <feColorMatrix in="outerLight" type="matrix" values="0 0 0 0 0.92 0 0 0 0 0.95 0 0 0 0 0.98 0 0 0 0.36 0" result="light"/>
      <feMerge>
        <feMergeNode in="dark"/>
        <feMergeNode in="light"/>
      </feMerge>
    </filter>
    <linearGradient id="plate-tone" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#6f777c"/>
      <stop offset="0.28" stop-color="#b5babd"/>
      <stop offset="0.58" stop-color="#8f969b"/>
      <stop offset="0.86" stop-color="#d4d7d8"/>
      <stop offset="1" stop-color="#eef0ef"/>
    </linearGradient>
    <linearGradient id="letter-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#565f66" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#22272b" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1917" height="735" fill="url(#plate-tone)"/>
  <path d="M-30 190 C 390 92, 770 265, 1190 126 S 1730 44, 1980 132" fill="none" stroke="#f8fbfd" stroke-opacity="0.22" stroke-width="170"/>
  <path d="M-40 360 C 410 265, 780 420, 1215 308 S 1710 245, 1985 334" fill="none" stroke="#485158" stroke-opacity="0.16" stroke-width="210"/>
  <path d="M-60 610 C 350 545, 790 635, 1170 515 S 1650 438, 1990 492" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="150"/>
  <rect width="1917" height="735" fill="#e9ecea" opacity="0.10"/>
  <rect width="1917" height="735" fill="#d7d9d8" opacity="0.16"/>
  <rect width="1917" height="735" filter="url(#plate-grain)" opacity="0.85"/>
  <ellipse cx="1515" cy="92" rx="460" ry="150" fill="#ffffff" opacity="0.16"/>
  <ellipse cx="330" cy="150" rx="430" ry="210" fill="#46505b" opacity="0.12"/>

  <g font-family="Arial Black, Helvetica Neue, Arial, sans-serif" font-size="155" font-weight="900" letter-spacing="-5">
    <text x="52" y="645" fill="none" stroke="#101417" stroke-opacity="0.28" stroke-width="5" filter="url(#letter-deboss)">OUTERSCOPE</text>
    <text x="52" y="645" fill="url(#letter-fill)" stroke="#dfe3e6" stroke-opacity="0.28" stroke-width="1.6">OUTERSCOPE</text>
    <text x="49" y="641" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.2">OUTERSCOPE</text>
    <text x="56" y="650" fill="none" stroke="#1a2025" stroke-opacity="0.18" stroke-width="1.2">OUTERSCOPE</text>
  </g>
</svg>
