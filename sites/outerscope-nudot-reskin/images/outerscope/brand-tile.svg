<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280" role="img" aria-label="Outerscope brand tile">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.18" stop-color="#8d99a6"/>
      <stop offset="0.48" stop-color="#202832"/>
      <stop offset="0.72" stop-color="#cad7e6"/>
      <stop offset="1" stop-color="#111821"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070a"/>
      <stop offset="0.52" stop-color="#101824"/>
      <stop offset="1" stop-color="#030405"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#9bdcf5"/>
      <stop offset="0.26" stop-color="#1f6f91"/>
      <stop offset="0.68" stop-color="#071620"/>
      <stop offset="1" stop-color="#020304"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.72 0 0 0 0 1 0 0 0 .8 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="500" height="280" fill="#050505"/>
  <rect width="500" height="280" fill="url(#grid)" opacity="0.08"/>
  <rect width="500" height="280" filter="url(#glow)" opacity="0.08"/>
  <text x="250" y="150" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="46" letter-spacing="1.5" fill="#f4f4f0">OUTERSCOPE</text>
  <text x="250" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" letter-spacing="7" fill="#9a9a94">AI AUTOMATION STUDIO</text>
	
</svg>
